<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Primary meta -->
    <title>Tanis Hub — HR &amp; Workforce Management</title>
    <meta name="description" content="Tanis Hub is the internal HR and workforce management portal for Tanis — Egypt's premier BPO provider. Manage agents, payroll, performance, and recruitment in one place." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tanis Hub — HR &amp; Workforce Management" />
    <meta property="og:description" content="Internal HR portal for Tanis. Manage agents, payroll, performance, and recruitment — all in one place." />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Tanis Hub" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tanis Hub — HR &amp; Workforce Management" />
    <meta name="twitter:description" content="Internal HR portal for Tanis. Manage agents, payroll, performance, and recruitment." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
